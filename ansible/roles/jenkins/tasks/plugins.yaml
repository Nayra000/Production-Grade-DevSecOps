- name: Wait for Jenkins to start
  wait_for:
    port: 8080
    delay: 30

- name: Copy plugin list
  copy:
    src: plugins.txt
    dest: /tmp/plugins.txt
    mode: '0644'

- name: Download plugin manager
  get_url:
    url: https://github.com/jenkinsci/plugin-installation-manager-tool/releases/download/2.14.0/jenkins-plugin-manager-2.14.0.jar
    dest: /tmp/jenkins-plugin-manager.jar
    mode: '0644'
    force: false                       

- name: Ensure plugins directory exists
  file:
    path: /var/lib/jenkins/plugins
    state: directory
    owner: jenkins
    group: jenkins
    mode: '0755'

- name: Check previous plugins.txt checksum
  stat:
    path: /var/lib/jenkins/.plugins_checksum
  register: checksum_file

- name: Get current plugins.txt checksum
  stat:
    path: /tmp/plugins.txt
    checksum_algorithm: md5
  register: current_checksum

- name: Read previous checksum
  slurp:
    src: /var/lib/jenkins/.plugins_checksum
  register: previous_checksum
  when: checksum_file.stat.exists

- name: Install plugins
  shell: |
    java -jar /tmp/jenkins-plugin-manager.jar \
    --war /usr/share/java/jenkins.war \
    --plugin-file /tmp/plugins.txt \
    --plugin-download-directory /var/lib/jenkins/plugins
  when: >
    not checksum_file.stat.exists or
    current_checksum.stat.checksum != (previous_checksum.content | default('') | b64decode | trim)
  register: plugins_installed              

- name: Save plugins checksum
  copy:
    content: "{{ current_checksum.stat.checksum }}"
    dest: /var/lib/jenkins/.plugins_checksum
  when: plugins_installed is changed     

- name: Fix plugins ownership
  file:
    path: /var/lib/jenkins/plugins
    state: directory
    owner: jenkins
    group: jenkins
    recurse: yes
  when: plugins_installed is changed         

- name: Restart Jenkins
  service:
    name: jenkins
    state: restarted
  when: plugins_installed is changed        