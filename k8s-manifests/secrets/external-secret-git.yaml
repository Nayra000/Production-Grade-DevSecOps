apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: github-secret
  namespace: argocd
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: aws-secrets-manager-store   
    kind: ClusterSecretStore          
  target:
    name: github-secret   
    creationPolicy: Owner
  data:
    - secretKey: username
      remoteRef:
        key: github-credentials      
        property: GITHUB_USERNAME
    - secretKey: password
      remoteRef:
        key: github-credentials
        property: GITHUB_TOKEN
                                                              