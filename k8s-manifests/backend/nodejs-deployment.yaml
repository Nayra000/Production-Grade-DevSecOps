apiVersion: apps/v1
kind: Deployment
metadata:
  name: nodejs-app
  namespace: default
  labels:
    app: nodejs-app
spec:
  replicas: 2
  selector:
    matchLabels:
      app: nodejs-app
  template:
    metadata:
      labels:
        app: nodejs-app
    spec:
      containers:
        - name: nodejs-app
          image: 054892330771.dkr.ecr.us-east-1.amazonaws.com/myapp:1
          ports:
            - containerPort: 3000
          env:
            - name: MONGO_URI
              valueFrom:
                secretKeyRef:
                  name: nodejs-app-secret
                  key: MONGO_URI
            - name: PORT
              valueFrom:
                configMapKeyRef:
                  name: nodejs-app-config
                  key: PORT
