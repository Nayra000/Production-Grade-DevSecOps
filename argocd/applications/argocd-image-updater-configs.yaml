apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: argocd-configs
  namespace: argocd

spec:
  project: default
  
  source:
    repoURL: https://github.com/Nayra000/Production-Grade-DevSecOps.git
    targetRevision:  main
    path: k8s-manifests/argocd-configs

  
  destination:
    server: https://kubernetes.default.svc
    namespace: argocd
  
  syncPolicy:
    automated:
      prune: true
      selfHeal: true