apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: argocd-image-updater
  namespace: argocd
spec:
  project: default
  source:
    repoURL: https://argoproj.github.io/argo-helm
    chart: argocd-image-updater
    targetRevision: 0.9.6         
    helm:
      values: |
        config:
          registries:
            - name: ECR
              api_url: https://054892330771.dkr.ecr.us-east-1.amazonaws.com
              prefix: 054892330771.dkr.ecr.us-east-1.amazonaws.com
              default: true
              insecure: false
              credentials: ext:/scripts/ecr-login.sh  
              credsexpire: 10h
        serviceAccount:
          create: true
          name: argocd-image-updater-sa
          annotations:
            eks.amazonaws.com/role-arn: arn:aws:iam::054892330771:role/argocd-image-updater-role
        authScripts:
          enabled: true
          scripts:
            ecr-login.sh: |
              #!/bin/sh
              aws ecr get-login-password --region us-east-1 \
                | printf "AWS:%s" "$(cat)"
  destination:
    server: https://kubernetes.default.svc
    namespace: argocd
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=false