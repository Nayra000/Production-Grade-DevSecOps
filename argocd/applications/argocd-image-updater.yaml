apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: argocd-image-updater
  namespace: argocd
spec:
  project: default
  source:
    repoURL: https://argoproj.github.io/argo-helm
    chart: argocd-image-updater
    targetRevision: 0.12.1  
    helm:
      values: |
        config:
          argocd:
            serverAddress: argocd-server.argocd.svc.cluster.local:443
            grpcWeb: true
        serviceAccount:
          create: true
          name: argocd-image-updater-sa
          annotations:
            eks.amazonaws.com/role-arn: arn:aws:iam::054892330771:role/argocd-image-updater-role
  destination:
    server: https://kubernetes.default.svc
    namespace: argocd
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=false